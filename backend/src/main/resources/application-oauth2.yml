# OAuth2 Provider Configuration
# This section allows you to configure OAuth2 providers dynamically
# Add new providers by adding new entries under the providers map

oauth2:
  providers:
    google:
      display-name: "Google"
      enabled: true
      config:
        client-id: "${OAUTH2_GOOGLE_CLIENT_ID}"
        client-secret: "${OAUTH2_GOOGLE_CLIENT_SECRET}"
        scope: "openid,email,profile"
        authorization-grant-type: "authorization_code"
        redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
    
    microsoft:
      display-name: "Microsoft"
      enabled: true
      config:
        client-id: "${OAUTH2_MICROSOFT_CLIENT_ID}"
        client-secret: "${OAUTH2_MICROSOFT_CLIENT_SECRET}"
        scope: "openid,email,profile"
        authorization-grant-type: "authorization_code"
        redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
    
    # Example of adding a new provider (GitHub)
    github:
      display-name: "GitHub"
      enabled: false  # Set to true to enable
      config:
        client-id: "${OAUTH2_GITHUB_CLIENT_ID}"
        client-secret: "${OAUTH2_GITHUB_CLIENT_SECRET}"
        scope: "user:email"
        authorization-grant-type: "authorization_code"
        redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
    
    # Example of adding Facebook
    facebook:
      display-name: "Facebook"
      enabled: false  # Set to true to enable
      config:
        client-id: "${OAUTH2_FACEBOOK_CLIENT_ID}"
        client-secret: "${OAUTH2_FACEBOOK_CLIENT_SECRET}"
        scope: "email,public_profile"
        authorization-grant-type: "authorization_code"
        redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

# Spring Security OAuth2 Configuration
spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "${OAUTH2_GOOGLE_CLIENT_ID}"
            client-secret: "${OAUTH2_GOOGLE_CLIENT_SECRET}"
            scope: openid,email,profile
            
          microsoft:
            client-id: "${OAUTH2_MICROSOFT_CLIENT_ID}"
            client-secret: "${OAUTH2_MICROSOFT_CLIENT_SECRET}"
            scope: openid,email,profile
            
          # Uncomment and configure when enabling GitHub
          # github:
          #   client-id: "${OAUTH2_GITHUB_CLIENT_ID}"
          #   client-secret: "${OAUTH2_GITHUB_CLIENT_SECRET}"
          #   scope: user:email
            
        provider:
          microsoft:
            authorization-uri: https://login.microsoftonline.com/common/oauth2/v2.0/authorize
            token-uri: https://login.microsoftonline.com/common/oauth2/v2.0/token
            user-info-uri: https://graph.microsoft.com/v1.0/me
            user-name-attribute: id
