databaseChangeLog:
  - changeSet:
      id: create-refresh-token-table
      author: system
      changes:
        - createTable:
            tableName: refresh_tokens
            columns:
              - column:
                  name: refresh_token_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: refresh_token_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: refresh_token_expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token_revoked
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: refresh_token_created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: refresh_tokens
            baseColumnNames: refresh_token_user_id
            referencedTableName: user
            referencedColumnNames: user_id
            constraintName: fk_refresh_token_user
            onDelete: CASCADE
        - createIndex:
            tableName: refresh_tokens
            indexName: idx_token_hash
            columns:
              - column:
                  name: refresh_token_hash
