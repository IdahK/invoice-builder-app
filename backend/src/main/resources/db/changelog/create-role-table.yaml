databaseChangeLog:
  - changeSet:
      id: create-role-table
      author: system
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: role_id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: role_name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
